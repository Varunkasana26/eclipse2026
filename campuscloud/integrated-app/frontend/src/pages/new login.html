<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CloudGPU · Access Terminal</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --c: #00d4ff;
      --p: #bb55ff;
      --g: #00ff88;
      --bg: #04060e;
      --card: #080c18;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    /* ══ ROOM / ENVIRONMENT ══ */
    #env {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 100% 60% at 50% 110%, rgba(0, 30, 60, .9) 0%, transparent 60%),
        linear-gradient(180deg, #030508 0%, #060d1a 60%, #08111e 100%);
    }

    /* Neon wall lines */
    .wline {
      position: fixed;
      background: var(--c);
      z-index: 1;
    }

    .wl {
      top: 8%;
      left: 0;
      width: 2px;
      height: 60%;
      box-shadow: 0 0 18px 5px rgba(0, 212, 255, .5), 0 0 60px 8px rgba(0, 212, 255, .15);
    }

    .wr {
      top: 4%;
      right: 0;
      width: 2px;
      height: 75%;
      box-shadow: 0 0 18px 5px rgba(0, 212, 255, .5), 0 0 60px 8px rgba(0, 212, 255, .15);
      animation: wPulse 3s ease-in-out infinite alternate .8s;
    }

    .wt {
      top: 0;
      left: 8%;
      width: 84%;
      height: 2px;
      box-shadow: 0 0 18px 5px rgba(0, 212, 255, .4), 0 0 60px 8px rgba(0, 212, 255, .12);
      animation: wPulse 3s ease-in-out infinite alternate .4s;
    }

    @keyframes wPulse {
      0% {
        opacity: .4
      }

      100% {
        opacity: .95
      }
    }

    /* Perspective grid floor */
    #floor {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 220px;
      z-index: 1;
      background:
        linear-gradient(rgba(0, 212, 255, .05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, .05) 1px, transparent 1px);
      background-size: 55px 55px;
      transform: perspective(250px) rotateX(62deg);
      transform-origin: bottom;
      mask-image: linear-gradient(to top, rgba(0, 0, 0, .7), transparent);
    }

    /* Table glow */
    #table-glow {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 60px;
      background: radial-gradient(ellipse at center, rgba(0, 212, 255, .18), transparent 70%);
      filter: blur(8px);
      z-index: 2;
      opacity: 0;
      transition: opacity 1s;
    }

    /* Floating dust particles */
    #dust {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .dp {
      position: absolute;
      border-radius: 50%;
      animation: dustFloat linear infinite;
      opacity: 0;
    }

    @keyframes dustFloat {
      0% {
        transform: translateY(100vh);
        opacity: 0
      }

      10% {
        opacity: .7
      }

      90% {
        opacity: .3
      }

      100% {
        transform: translateY(-5vh);
        opacity: 0
      }
    }

    /* ══ STAGE ══ */
    #stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ══ GPU WRAPPER — 3D perspective tilt like the GIF ══ */
    #gpu-world {
      position: relative;
      transform-style: preserve-3d;
      perspective: 900px;
    }

    #gpu-container {
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(22deg) rotateY(-28deg);
      /* Phase 0: drop in from above */
      animation: gpuDrop 1s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes gpuDrop {
      from {
        transform: rotateX(22deg) rotateY(-28deg) translateY(-180px) translateZ(60px);
        opacity: 0;
      }

      to {
        transform: rotateX(22deg) rotateY(-28deg) translateY(0) translateZ(0);
        opacity: 1;
      }
    }

    /* — GPU BODY SHELL — */
    #gpu-body {
      position: relative;
      width: 420px;
      height: 150px;
      background: linear-gradient(145deg, #1c2030 0%, #0f1220 55%, #0a0c18 100%);
      border-radius: 12px 12px 5px 5px;
      border: 1.5px solid rgba(0, 212, 255, .12);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, .8),
        0 0 0 1px rgba(0, 212, 255, .04),
        inset 0 1px 0 rgba(255, 255, 255, .04);
      overflow: visible;
      transition: box-shadow .8s;
    }

    /* Body explode: top panel cracks open */
    #panel-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, #1e2438, #131828);
      border-radius: 12px 12px 0 0;
      transform-origin: top center;
      transition: transform 1.2s cubic-bezier(.22, 1, .36, 1), opacity .8s;
      border-bottom: 1px solid rgba(0, 212, 255, .08);
    }

    #panel-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, #131828, #0a0c18);
      border-radius: 0 0 5px 5px;
      transform-origin: bottom center;
      transition: transform 1.2s cubic-bezier(.22, 1, .36, 1) .1s, opacity .8s;
    }

    /* RGB bar bottom */
    #rgb-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 5px;
      border-radius: 0 0 5px 5px;
      background: linear-gradient(90deg, #ff2060, #ff7700, #ffee00, #00ee55, var(--c), var(--p), #ff2060);
      background-size: 300%;
      animation: rgbShift 2s linear infinite;
      box-shadow: 0 4px 24px rgba(0, 200, 255, .5);
      opacity: 0;
      transition: opacity 1s;
    }

    @keyframes rgbShift {
      to {
        background-position: 300% 0
      }
    }

    /* RGB side stripe */
    #rgb-side {
      position: absolute;
      top: 15%;
      bottom: 15%;
      left: 0;
      width: 4px;
      border-radius: 3px 0 0 3px;
      background: linear-gradient(180deg, var(--c), var(--p));
      box-shadow: -4px 0 14px rgba(0, 200, 255, .6);
      animation: rgbSideAnim 1.8s linear infinite alternate;
      opacity: 0;
      transition: opacity 1s;
    }

    @keyframes rgbSideAnim {
      to {
        background: linear-gradient(180deg, var(--p), var(--c));
      }
    }

    /* — LEFT HEATSINK FINS — */
    #heatsink {
      position: absolute;
      left: -42px;
      top: 10px;
      bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: transform 1.2s cubic-bezier(.22, 1, .36, 1), opacity .6s;
    }

    .fin {
      flex: 1;
      width: 40px;
      background: linear-gradient(90deg, #0e1020, #181c2a);
      border-left: 2px solid rgba(0, 212, 255, .0);
      border-radius: 3px 0 0 3px;
      transition: border-color .5s, box-shadow .5s;
    }

    .fin-on {
      border-left-color: rgba(0, 212, 255, .6) !important;
      box-shadow: -3px 0 10px rgba(0, 212, 255, .3) !important;
    }

    /* Brand panel */
    #brand-panel {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: opacity .8s;
    }

    .b-diamond {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #0066cc, #00aaff);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      filter: drop-shadow(0 0 10px rgba(0, 170, 255, .9));
      animation: dPulse 2s ease-in-out infinite alternate;
    }

    @keyframes dPulse {
      0% {
        filter: drop-shadow(0 0 6px rgba(0, 170, 255, .5))
      }

      100% {
        filter: drop-shadow(0 0 18px rgba(0, 212, 255, 1))
      }
    }

    .b-text {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 900;
      color: rgba(255, 255, 255, .92);
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(0, 212, 255, .5);
    }

    /* PCB lines */
    .pcb {
      position: absolute;
      background: rgba(0, 212, 255, .06);
    }

    /* Model label */
    #model-label {
      position: absolute;
      bottom: 8px;
      right: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: rgba(0, 212, 255, .4);
      letter-spacing: 3px;
      text-shadow: 0 0 8px rgba(0, 212, 255, .4);
      opacity: 0;
      transition: opacity 1s 2.5s;
    }

    /* — FAN UNITS — */
    .fan-wrap {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      transition: transform 1.4s cubic-bezier(.22, 1, .36, 1), opacity .6s;
    }

    #fan1 {
      right: 20px;
    }

    #fan2 {
      right: 120px;
    }

    #fan3 {
      right: 220px;
    }

    .fan-outer {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Glowing RGB ring around fan */
    .fan-ring-glow {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(var(--c) 0deg, transparent 100deg, var(--p) 200deg, transparent 300deg, var(--c) 360deg);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #fff calc(100% - 3px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #fff calc(100% - 3px));
      animation: ringRot 1.8s linear infinite;
      opacity: 0;
      transition: opacity 1s;
      filter: blur(.5px);
    }

    .fan-unit:nth-child(2) .fan-ring-glow {
      background: conic-gradient(var(--p) 0deg, transparent 100deg, var(--c) 200deg, transparent 300deg, var(--p) 360deg);
      animation-direction: reverse;
      animation-duration: 2.2s;
    }

    @keyframes ringRot {
      to {
        transform: rotate(360deg)
      }
    }

    .fan-ring-glow-outer {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      box-shadow: 0 0 14px 3px rgba(0, 212, 255, .5), 0 0 30px 8px rgba(0, 212, 255, .15);
      opacity: 0;
      transition: opacity 1s;
      animation: ringPls 2s ease-in-out infinite alternate;
    }

    @keyframes ringPls {
      0% {
        opacity: .3
      }

      100% {
        opacity: .8
      }
    }

    .fan-housing {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 32%, #1e2338, #0c0e1a);
      border: 1.5px solid rgba(255, 255, 255, .06);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Fan blades */
    .blade-g {
      transform-origin: 34px 34px;
      animation: bladeSpinA .65s linear infinite;
      animation-play-state: paused;
    }

    @keyframes bladeSpinA {
      to {
        transform: rotate(360deg)
      }
    }

    .fan-center {
      fill: #141820;
    }

    .fan-center-dot {
      fill: var(--c);
      opacity: .7;
    }

    /* Screws at corners */
    .screw {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #2a2e40, #0e1018);
      border: 1px solid rgba(255, 255, 255, .07);
    }

    /* IO bracket */
    #io {
      position: absolute;
      bottom: -18px;
      left: 0;
      right: 0;
      height: 18px;
      background: #0d0f1a;
      border: 1.5px solid rgba(0, 212, 255, .08);
      border-top: none;
      border-radius: 0 0 8px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: opacity .6s;
    }

    .io-port {
      width: 22px;
      height: 10px;
      border-radius: 2px;
      background: #080a14;
      border: 1px solid rgba(0, 212, 255, .15);
      box-shadow: 0 0 5px rgba(0, 212, 255, .2);
    }

    /* Table reflection under GPU */
    #reflect {
      position: absolute;
      bottom: -26px;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, .4), rgba(170, 85, 255, .3), transparent);
      filter: blur(2px);
      opacity: 0;
      transition: opacity 1s;
      border-radius: 50%;
    }

    #shadow {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 380px;
      height: 40px;
      background: radial-gradient(ellipse, rgba(0, 0, 0, .8), transparent 70%);
      filter: blur(6px);
      opacity: 0;
      transition: opacity 1s;
    }

    /* ══ LOGIN FORM (rises from GPU center) ══ */
    #login-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }

    #login-overlay.visible {
      pointer-events: all;
      opacity: 1;
    }

    /* Dark backdrop */
    #login-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(4, 6, 14, .82);
      backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity .8s;
    }

    /* Login card */
    #login-card {
      position: relative;
      z-index: 51;
      width: 360px;
      background: rgba(6, 10, 20, .92);
      border: 1px solid rgba(0, 212, 255, .18);
      border-radius: 18px;
      padding: 40px 36px;
      transform: translateY(60px) scale(.9);
      opacity: 0;
      transition: transform .9s cubic-bezier(.22, 1, .36, 1), opacity .7s;
      box-shadow:
        0 0 0 1px rgba(0, 212, 255, .06),
        0 30px 80px rgba(0, 0, 0, .7),
        0 0 60px rgba(0, 212, 255, .06),
        inset 0 0 40px rgba(0, 212, 255, .02);
    }

    #login-card.show {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    /* Corner neon brackets */
    #login-card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      width: 55px;
      height: 55px;
      border-top: 2px solid var(--c);
      border-left: 2px solid var(--c);
      border-radius: 18px 0 0 0;
      box-shadow: -5px -5px 16px rgba(0, 212, 255, .35);
    }

    #login-card::after {
      content: '';
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 55px;
      height: 55px;
      border-bottom: 2px solid var(--p);
      border-right: 2px solid var(--p);
      border-radius: 0 0 18px 0;
      box-shadow: 5px 5px 16px rgba(187, 85, 255, .35);
    }

    /* Scan line inside card */
    .scan {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, .6), transparent);
      border-radius: 18px 18px 0 0;
      filter: blur(1px);
      animation: scanDown 5s linear infinite;
    }

    @keyframes scanDown {
      0% {
        top: 0;
        opacity: 0
      }

      5% {
        opacity: 1
      }

      95% {
        opacity: .3
      }

      100% {
        top: 100%;
        opacity: 0
      }
    }

    .card-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 26px;
    }

    .logo-box {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      background: linear-gradient(135deg, #004488, #0088cc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      box-shadow: 0 0 18px rgba(0, 136, 204, .45);
      border: 1px solid rgba(0, 212, 255, .2);
    }

    .logo-name {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--c);
      letter-spacing: 3px;
      text-shadow: 0 0 12px rgba(0, 212, 255, .5);
    }

    .card-title {
      font-family: 'Orbitron', monospace;
      font-size: 21px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 5px;
      text-shadow: 0 0 30px rgba(0, 212, 255, .2);
    }

    .card-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: rgba(140, 160, 190, .7);
      margin-bottom: 28px;
      letter-spacing: .4px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(0, 212, 255, .5);
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .inp-w {
      position: relative;
    }

    .inp-w input {
      width: 100%;
      background: rgba(0, 212, 255, .025);
      border: 1px solid rgba(0, 212, 255, .1);
      border-radius: 9px;
      padding: 11px 14px 11px 42px;
      color: #d8eaf8;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color .3s, box-shadow .3s, background .3s;
    }

    .inp-w input:focus {
      border-color: var(--c);
      background: rgba(0, 212, 255, .06);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, .1), 0 0 20px rgba(0, 212, 255, .05);
    }

    .inp-w input::placeholder {
      color: rgba(255, 255, 255, .14);
    }

    .inp-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      opacity: .4;
      transition: opacity .3s;
    }

    .inp-w input:focus+.inp-icon {
      opacity: .9;
    }

    .btn-sign {
      width: 100%;
      padding: 13px;
      margin-top: 10px;
      background: linear-gradient(135deg, rgba(0, 90, 180, .85), rgba(0, 50, 130, .9));
      border: 1px solid rgba(0, 212, 255, .28);
      border-radius: 9px;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .3s, border-color .3s;
      box-shadow: 0 4px 20px rgba(0, 100, 200, .3), inset 0 1px 0 rgba(255, 255, 255, .05);
    }

    .btn-sign:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 212, 255, .4);
      border-color: var(--c);
    }

    .btn-sign::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 55%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .1), transparent);
      transform: skewX(-20deg);
      animation: btnShimmer 3.5s ease-in-out infinite;
    }

    @keyframes btnShimmer {

      0%,
      100% {
        left: -100%
      }

      50% {
        left: 160%
      }
    }

    .flinks {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
    }

    .flinks a {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: rgba(100, 120, 150, .7);
      text-decoration: none;
      transition: color .2s;
      letter-spacing: .5px;
    }

    .flinks a:hover {
      color: var(--c);
      text-shadow: 0 0 8px rgba(0, 212, 255, .4);
    }

    /* GPU Meters */
    .meters {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid rgba(0, 212, 255, .06);
    }

    .mt-row {
      display: flex;
      justify-content: space-between;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(100, 120, 150, .8);
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .mt-val {
      color: var(--c);
    }

    .mt-track {
      height: 3px;
      background: rgba(255, 255, 255, .04);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .mt-fill {
      height: 100%;
      border-radius: 2px;
      width: 0;
      transition: width 1.5s cubic-bezier(.22, 1, .36, 1);
    }

    .mf1 {
      background: linear-gradient(90deg, #0044aa, var(--c));
      box-shadow: 0 0 8px rgba(0, 212, 255, .6);
    }

    .mf2 {
      background: linear-gradient(90deg, #5500aa, var(--p));
      box-shadow: 0 0 8px rgba(187, 85, 255, .6);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: rgba(80, 110, 140, .8);
      margin-top: 4px;
    }

    .s-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00ee55;
      box-shadow: 0 0 6px #00ee55;
      animation: sDotPls 1.5s ease-in-out infinite;
    }

    @keyframes sDotPls {

      0%,
      100% {
        opacity: .5
      }

      50% {
        opacity: 1
      }
    }

    /* ══ PHASE TEXT OVERLAY ══ */
    #phase-text {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: rgba(0, 212, 255, .6);
      letter-spacing: 3px;
      text-transform: uppercase;
      z-index: 100;
      opacity: 0;
      transition: opacity .5s;
      text-shadow: 0 0 10px rgba(0, 212, 255, .4);
    }

    /* Skip button */
    #skip-btn {
      position: fixed;
      bottom: 20px;
      right: 24px;
      z-index: 200;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(100, 120, 150, .6);
      letter-spacing: 2px;
      background: none;
      border: 1px solid rgba(100, 120, 150, .2);
      border-radius: 4px;
      padding: 5px 12px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }

    #skip-btn:hover {
      color: var(--c);
      border-color: rgba(0, 212, 255, .4);
    }

    /* Explosion sparks */
    .spark {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--c);
      pointer-events: none;
      z-index: 200;
      animation: sparkFly .8s ease-out forwards;
    }

    @keyframes sparkFly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(var(--sx), var(--sy)) scale(0);
        opacity: 0;
      }
    }

    /* ═══ EXPLOSION GLOW ═══ */
    #exp-glow {
      position: fixed;
      inset: 0;
      z-index: 9;
      background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(0, 212, 255, .18), transparent 70%);
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s;
    }
  </style>
</head>

<body>

  <!-- Environment -->
  <div id="env"></div>
  <div class="wline wl"></div>
  <div class="wline wr"></div>
  <div class="wline wt"></div>
  <div id="floor"></div>
  <div id="table-glow"></div>
  <div id="dust"></div>
  <div id="exp-glow"></div>

  <!-- Phase label -->
  <div id="phase-text"></div>
  <button id="skip-btn" onclick="skipToLogin()">SKIP INTRO ▶</button>

  <!-- ══ GPU STAGE ══ -->
  <div id="stage">
    <div id="gpu-world">
      <div id="gpu-container">

        <!-- Shadow & reflection -->
        <div id="shadow"></div>
        <div id="reflect"></div>

        <!-- GPU BODY -->
        <div id="gpu-body">
          <div id="panel-top"></div>
          <div id="panel-bottom"></div>
          <div id="rgb-bar"></div>
          <div id="rgb-side"></div>
          <div id="model-label">RTX 5090 · 32GB GDDR7X · CLOUDGPU</div>

          <!-- PCB trace lines -->
          <div class="pcb" style="top:12px;left:110px;width:50px;height:1px;"></div>
          <div class="pcb" style="top:16px;left:110px;width:24px;height:1px;"></div>
          <div class="pcb" style="top:12px;left:110px;width:1px;height:28px;"></div>

          <!-- Brand -->
          <div id="brand-panel">
            <div class="b-diamond"></div>
            <div class="b-text">GPU</div>
          </div>

          <!-- Corner screws -->
          <div class="screw" style="top:8px;left:90px;"></div>
          <div class="screw" style="top:8px;right:8px;"></div>
          <div class="screw" style="bottom:8px;left:90px;"></div>
          <div class="screw" style="bottom:8px;right:8px;"></div>

          <!-- Fan 1 (rightmost) -->
          <div class="fan-wrap" id="fan1">
            <div class="fan-outer">
              <div class="fan-ring-glow"></div>
              <div class="fan-ring-glow-outer"></div>
              <div class="fan-housing">
                <svg width="80" height="80" viewBox="0 0 68 68" fill="none">
                  <g class="blade-g">
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#181c2a" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#1d2232" transform="rotate(60 34 34)" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#181c2a" transform="rotate(120 34 34)" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#1d2232" transform="rotate(180 34 34)" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#181c2a" transform="rotate(240 34 34)" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#1d2232" transform="rotate(300 34 34)" />
                  </g>
                  <circle cx="34" cy="34" r="9" class="fan-center" />
                  <circle cx="34" cy="34" r="5" fill="#1a1e2c" />
                  <circle cx="34" cy="34" r="2.5" class="fan-center-dot" />
                </svg>
              </div>
            </div>
          </div>

          <!-- Fan 2 (middle) -->
          <div class="fan-wrap" id="fan2">
            <div class="fan-outer">
              <div class="fan-ring-glow"
                style="background:conic-gradient(var(--p) 0deg,transparent 100deg,var(--c) 200deg,transparent 300deg,var(--p) 360deg);animation-direction:reverse;animation-duration:2.4s;">
              </div>
              <div class="fan-ring-glow-outer"
                style="box-shadow:0 0 14px 3px rgba(187,85,255,.5),0 0 30px 8px rgba(187,85,255,.15);"></div>
              <div class="fan-housing">
                <svg width="80" height="80" viewBox="0 0 68 68" fill="none">
                  <g class="blade-g" style="animation-delay:-.22s">
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#1d2232" transform="rotate(30 34 34)" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#181c2a" transform="rotate(90 34 34)" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#1d2232" transform="rotate(150 34 34)" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#181c2a" transform="rotate(210 34 34)" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#1d2232" transform="rotate(270 34 34)" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#181c2a" transform="rotate(330 34 34)" />
                  </g>
                  <circle cx="34" cy="34" r="9" class="fan-center" />
                  <circle cx="34" cy="34" r="5" fill="#1a1e2c" />
                  <circle cx="34" cy="34" r="2.5" fill="var(--p)" opacity=".7" />
                </svg>
              </div>
            </div>
          </div>

          <!-- Fan 3 (left) -->
          <div class="fan-wrap" id="fan3">
            <div class="fan-outer">
              <div class="fan-ring-glow"></div>
              <div class="fan-ring-glow-outer"></div>
              <div class="fan-housing">
                <svg width="80" height="80" viewBox="0 0 68 68" fill="none">
                  <g class="blade-g" style="animation-delay:-.44s">
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#181c2a" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#1d2232" transform="rotate(60 34 34)" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#181c2a" transform="rotate(120 34 34)" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#1d2232" transform="rotate(180 34 34)" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#181c2a" transform="rotate(240 34 34)" />
                    <ellipse cx="34" cy="17" rx="7.5" ry="16" fill="#1d2232" transform="rotate(300 34 34)" />
                  </g>
                  <circle cx="34" cy="34" r="9" class="fan-center" />
                  <circle cx="34" cy="34" r="5" fill="#1a1e2c" />
                  <circle cx="34" cy="34" r="2.5" class="fan-center-dot" />
                </svg>
              </div>
            </div>
          </div>
        </div>

        <!-- Heatsink -->
        <div id="heatsink">
          <div class="fin"></div>
          <div class="fin"></div>
          <div class="fin"></div>
          <div class="fin"></div>
          <div class="fin"></div>
          <div class="fin"></div>
          <div class="fin"></div>
          <div class="fin"></div>
          <div class="fin"></div>
          <div class="fin"></div>
        </div>

        <!-- IO bracket -->
        <div id="io">
          <div class="io-port"></div>
          <div class="io-port"></div>
          <div class="io-port"></div>
          <div class="io-port"></div>
        </div>

      </div><!-- /gpu-container -->
    </div><!-- /gpu-world -->
  </div><!-- /stage -->

  <!-- ══ LOGIN OVERLAY ══ -->
  <div id="login-overlay">
    <div id="login-backdrop"></div>
    <div id="login-card">
      <div class="scan"></div>

      <div class="card-logo">
        <div class="logo-box">⚡</div>
        <div class="logo-name">CLOUDGPU</div>
      </div>

      <div class="card-title">Welcome Back</div>
      <div class="card-sub">Sign in to access your GPU cluster</div>

      <div class="field">
        <label>Username</label>
        <div class="inp-w">
          <input type="text" value="the_coding_wizard" placeholder="your_handle" />
          <svg class="inp-icon" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="6" r="3" stroke="#00d4ff" stroke-width="1.5" />
            <path d="M2 14c0-3 2.7-5 6-5s6 2 6 5" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="inp-w">
          <input type="password" value="12345" placeholder="••••••••" />
          <svg class="inp-icon" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="7" rx="2" stroke="#00d4ff" stroke-width="1.5" />
            <path d="M5 7V5a3 3 0 016 0v2" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </div>
      </div>

      <button class="btn-sign">INITIALIZE SESSION</button>

      <div class="flinks">
        <a href="#">Forgot password?</a>
        <a href="#">Create account</a>
      </div>

      <div class="meters">
        <div class="mt-row"><span>GPU-0 · RTX 5090</span><span class="mt-val">72%</span></div>
        <div class="mt-track">
          <div class="mt-fill mf1" id="mf1"></div>
        </div>
        <div class="mt-row"><span>GPU-1 · H100 SXM</span><span class="mt-val">48%</span></div>
        <div class="mt-track">
          <div class="mt-fill mf2" id="mf2"></div>
        </div>
        <div class="status-row">
          <div class="s-dot"></div>
          <span>CLUSTER ONLINE · 2 NODES ACTIVE</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Dust particles ──
    const dustEl = document.getElementById('dust');
    for (let i = 0; i < 35; i++) {
      const d = document.createElement('div'); d.className = 'dp';
      const sz = Math.random() * 2.5 + 1;
      d.style.cssText = `
    left:${Math.random() * 100}vw;
    width:${sz}px;height:${sz}px;
    background:${Math.random() > .5 ? '#00d4ff' : '#bb55ff'};
    animation-duration:${9 + Math.random() * 14}s;
    animation-delay:${Math.random() * 14}s;
    opacity:${.3 + Math.random() * .4};
  `;
      dustEl.appendChild(d);
    }

    // ── Helpers ──
    const phaseEl = document.getElementById('phase-text');
    function showPhase(txt) { phaseEl.textContent = txt; phaseEl.style.opacity = '1'; }
    function hidePhase() { phaseEl.style.opacity = '0'; }
    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
    function qs(s) { return document.querySelector(s); }
    function qsa(s) { return document.querySelectorAll(s); }

    // ── Sparks emitter ──
    function emitSparks(el, count = 18) {
      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div'); s.className = 'spark';
        const angle = Math.random() * Math.PI * 2;
        const dist = 60 + Math.random() * 120;
        s.style.cssText = `
      left:${cx}px;top:${cy}px;
      --sx:${Math.cos(angle) * dist}px;
      --sy:${Math.sin(angle) * dist}px;
      background:${Math.random() > .5 ? '#00d4ff' : '#bb55ff'};
      animation-duration:${.5 + Math.random() * .5}s;
    `;
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 900);
      }
    }

    // ── ANIMATION SEQUENCE ──
    async function runSequence() {
      const gpuBody = qs('#gpu-body');
      const gpuCont = qs('#gpu-container');
      const fan1 = qs('#fan1');
      const fan2 = qs('#fan2');
      const fan3 = qs('#fan3');
      const heatsink = qs('#heatsink');
      const panelTop = qs('#panel-top');
      const panelBot = qs('#panel-bottom');
      const blades = qsa('.blade-g');
      const ringGlows = qsa('.fan-ring-glow');
      const ringOuter = qsa('.fan-ring-glow-outer');
      const rgbBar = qs('#rgb-bar');
      const rgbSide = qs('#rgb-side');
      const modelLabel = qs('#model-label');
      const tableGlow = qs('#table-glow');
      const shadow = qs('#shadow');
      const reflect = qs('#reflect');
      const expGlow = qs('#exp-glow');
      const fins = qsa('.fin');

      // — Phase 1: GPU drops in (CSS animation handles this, 1s) —
      showPhase('INITIALIZING HARDWARE...');
      await wait(1000);

      // Show ground elements
      tableGlow.style.opacity = '1';
      shadow.style.opacity = '1';
      reflect.style.opacity = '1';
      await wait(400);

      // — Phase 2: Power-on surge —
      showPhase('POWER SEQUENCE INITIATED');
      expGlow.style.opacity = '1';
      emitSparks(gpuBody, 8);
      await wait(200);
      expGlow.style.opacity = '0';
      await wait(600);

      // — Phase 3: Components FLY APART —
      showPhase('DEPLOYING COMPONENTS...');

      // Fans explode outward
      fan1.style.transition = 'transform 1s cubic-bezier(.22,1,.36,1), opacity .4s';
      fan2.style.transition = 'transform 1s cubic-bezier(.22,1,.36,1) .08s, opacity .4s';
      fan3.style.transition = 'transform 1s cubic-bezier(.22,1,.36,1) .16s, opacity .4s';

      fan1.style.transform = 'translateY(-50%) translateX(140px) translateZ(60px)';
      fan2.style.transform = 'translateY(-50%) translateX(0px) translateZ(80px)';
      fan3.style.transform = 'translateY(-50%) translateX(-140px) translateZ(60px)';

      // Panels crack open
      panelTop.style.transform = 'rotateX(-55deg) translateZ(8px)';
      panelBot.style.transform = 'rotateX(55deg) translateZ(8px)';

      // Heatsink slides left
      heatsink.style.transform = 'translateX(-60px) translateZ(30px)';

      emitSparks(gpuBody, 22);
      await wait(400);
      expGlow.style.opacity = '.6';
      await wait(200);
      expGlow.style.opacity = '0';

      await wait(900);

      // — Phase 4: Fans spin up with RGB glow —
      showPhase('SPINNING UP COOLING ARRAY...');
      blades.forEach(b => { b.style.animationPlayState = 'running'; });
      ringGlows.forEach(r => { r.style.opacity = '1'; });
      ringOuter.forEach(r => { r.style.opacity = '1'; });
      rgbBar.style.opacity = '1';
      rgbSide.style.opacity = '1';
      fins.forEach(f => { f.classList.add('fin-on'); });
      modelLabel.style.opacity = '1';

      await wait(1000);

      // — Phase 5: Components snap back —
      showPhase('ASSEMBLY COMPLETE');
      fan1.style.transform = 'translateY(-50%) translateX(0) translateZ(0)';
      fan2.style.transform = 'translateY(-50%) translateX(0) translateZ(0)';
      fan3.style.transform = 'translateY(-50%) translateX(0) translateZ(0)';
      panelTop.style.transform = 'rotateX(0) translateZ(0)';
      panelBot.style.transform = 'rotateX(0) translateZ(0)';
      heatsink.style.transform = 'translateX(0) translateZ(0)';

      await wait(1200);

      // — Phase 6: GPU tilts back, login appears —
      showPhase('ACCESS TERMINAL READY');

      // Tilt GPU away gently
      gpuCont.style.transition = 'transform 1.2s cubic-bezier(.22,1,.36,1), opacity 1s';
      gpuCont.style.transform = 'rotateX(22deg) rotateY(-28deg) scale(.72) translateX(-160px) translateY(20px)';
      gpuCont.style.opacity = '0.35';

      await wait(500);

      // Show login backdrop
      const overlay = qs('#login-overlay');
      const backdrop = qs('#login-backdrop');
      const card = qs('#login-card');

      overlay.classList.add('visible');
      backdrop.style.opacity = '1';

      await wait(200);
      card.classList.add('show');

      await wait(800);
      hidePhase();

      // Animate meters
      setTimeout(() => {
        qs('#mf1').style.width = '72%';
        qs('#mf2').style.width = '48%';
      }, 300);
    }

    function skipToLogin() {
      // Instantly show login
      const overlay = qs('#login-overlay');
      const backdrop = qs('#login-backdrop');
      const card = qs('#login-card');
      const gpuCont = qs('#gpu-container');
      const blades = qsa('.blade-g');
      const ringGlows = qsa('.fan-ring-glow');
      const ringOuter = qsa('.fan-ring-glow-outer');

      blades.forEach(b => b.style.animationPlayState = 'running');
      ringGlows.forEach(r => r.style.opacity = '1');
      ringOuter.forEach(r => r.style.opacity = '1');
      qs('#rgb-bar').style.opacity = '1';
      qs('#rgb-side').style.opacity = '1';
      qsa('.fin').forEach(f => f.classList.add('fin-on'));
      qs('#model-label').style.opacity = '1';
      qs('#table-glow').style.opacity = '1';
      qs('#shadow').style.opacity = '1';
      qs('#reflect').style.opacity = '1';

      gpuCont.style.transition = 'transform .8s, opacity .8s';
      gpuCont.style.transform = 'rotateX(22deg) rotateY(-28deg) scale(.72) translateX(-160px) translateY(20px)';
      gpuCont.style.opacity = '0.35';

      overlay.classList.add('visible');
      backdrop.style.opacity = '1';
      setTimeout(() => card.classList.add('show'), 200);

      setTimeout(() => {
        qs('#mf1').style.width = '72%';
        qs('#mf2').style.width = '48%';
      }, 600);

      hidePhase();
      qs('#skip-btn').style.display = 'none';
    }

    // Start sequence
    window.addEventListener('load', () => {
      runSequence();
    });
  </script>
</body>

</html>
