version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gpu-execution-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/user_code:/app/user_code
      - ./backend/templates:/app/templates:ro
    restart: unless-stopped
